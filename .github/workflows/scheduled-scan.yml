name: Scheduled Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

env:
  TARGET_LIST_REPO: ${{ vars.TARGET_LIST_REPO }}
  TARGET_LIST_PATH: ./list

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_PATH: ./cache/shizuku_finder.sqlite3
    steps:
      - uses: actions/checkout@v4
      - name: Checkout target list repo
        if: env.TARGET_LIST_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_LIST_REPO }}
          path: list
      - name: Ensure target list path exists
        run: mkdir -p list
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: shizuku-finder-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            shizuku-finder-${{ runner.os }}-
      - name: Scan
        run: |
          python -m shizuku_finder scan \
            --target-list-path $TARGET_LIST_PATH \
            --summary-file SUMMARY.md \
            --json-file summary.json \
            --csv-file summary.csv \
            --review-file REVIEW_NEEDED.md \
            --diff-file DIFF.md
      - name: Commit generated reports
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add SUMMARY.md summary.json summary.csv REVIEW_NEEDED.md DIFF.md cache || true
          git diff --cached --quiet || git commit -m "Update generated scan reports"
          git push
