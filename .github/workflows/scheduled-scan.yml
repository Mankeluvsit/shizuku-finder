name: Scheduled Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: scheduled-scan-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET_LIST_REPO: ${{ vars.TARGET_LIST_REPO }}
  TARGET_LIST_PATH: ./list

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_PATH: ./cache/shizuku_finder.sqlite3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true
      - name: Checkout target list repo
        if: env.TARGET_LIST_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_LIST_REPO }}
          path: list
      - name: Ensure target list path exists
        run: mkdir -p list
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: shizuku-finder-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            shizuku-finder-${{ runner.os }}-
      - name: Scan
        run: |
          python -m shizuku_finder scan \
            --target-list-path $TARGET_LIST_PATH \
            --summary-file SUMMARY.md \
            --json-file summary.json \
            --csv-file summary.csv \
            --review-file REVIEW_NEEDED.md \
            --diff-file DIFF.md \
            --diff-json-file DIFF.json \
            --run-summary-file RUN_SUMMARY.json
      - name: Publish run summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('RUN_SUMMARY.json')
          payload = json.loads(path.read_text(encoding='utf-8'))
          with open(Path.cwd() / 'job-summary.md', 'w', encoding='utf-8') as handle:
              handle.write('# Scan Summary\n\n')
              handle.write(f"- Status: **{payload['status']}**\n")
              handle.write(f"- Total apps: **{payload['total_apps']}**\n")
              handle.write(f"- Confirmed: **{payload['confirmed']}**\n")
              handle.write(f"- Review needed: **{payload['review_needed']}**\n")
              handle.write(f"- Failures: **{payload['failure_count']}**\n")
          PY
          cat job-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce minimum successful output
        run: |
          python - <<'PY'
          import json, sys
          payload = json.load(open('RUN_SUMMARY.json', encoding='utf-8'))
          if payload['status'] == 'failed':
              sys.exit('All scanners failed; refusing to publish empty run.')
          PY
      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-scan-artifacts
          path: |
            SUMMARY.md
            summary.json
            summary.csv
            REVIEW_NEEDED.md
            DIFF.md
            DIFF.json
            RUN_SUMMARY.json
          if-no-files-found: warn
      - name: Commit generated reports
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add SUMMARY.md summary.json summary.csv REVIEW_NEEDED.md DIFF.md DIFF.json RUN_SUMMARY.json cache || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Update generated scan reports"
          git push origin HEAD:${{ github.ref_name }}
